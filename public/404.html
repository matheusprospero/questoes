<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Redirecionando…</title>
    <script>
      // GitHub Pages + SPA: este arquivo é servido em qualquer rota que não
      // exista fisicamente (ex.: F5 em /questoes/estudo). Guardamos a rota
      // pedida e voltamos ao index, que a restaura via history.replaceState.
      (function () {
        var base = '/questoes';
        var rota = location.pathname.slice(base.length) + location.search + location.hash;
        sessionStorage.setItem('redirect', rota);
        location.replace(base + '/');
      })();
    </script>
  </head>
  <body></body>
</html>
